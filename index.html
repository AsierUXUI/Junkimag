<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>junkimagazine.com</title>
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Comic Neue', cursive;
    }

    /* Wrapper shrinks to viewport on small screens */
    .page-wrapper {
      width: 100%;
      overflow-x: hidden;
    }

    /* Fixed 600px canvas — scaled down on mobile via JS */
    .page {
      position: relative;
      width: 600px;
      height: 1440px;
      transform-origin: top left;
    }

    .block {
      position: absolute;
    }

    .block img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
    }

    /* Background texture */
    #image-993 {
      width: 1369px; height: 912px;
      left: 249px;   top: 457px;
      z-index: 10;
      overflow: hidden;
    }

    /* Logo */
    #image-995 {
      width: 459px; height: 237px;
      left: 230px;  top: 135px;
      z-index: 35;
      overflow: hidden;
    }

    /* Animated gif (tilted) */
    #image-996 {
      width: 244px; height: 214px;
      left: 487px;  top: 173px;
      z-index: 40;
      overflow: hidden;
      transform: rotate(-11.4deg);
    }

    /* Tagline */
    #text-about {
      left: 64px; top: 206px;
      z-index: 30;
      font-size: 38px; /* 0.064 × 600 */
      line-height: 1.25;
      text-align: center;
      color: #000;
      white-space: nowrap;
    }

    /* Main content image */
    #image-994 {
      width: 934px; height: 794px;
      left: 135px;  top: 640px;
      z-index: 45;
      overflow: hidden;
    }

    /* Left decorative panel (no link) */
    #image-998 {
      width: 345px; height: 494px;
      left: -200px; top: 725px;
      z-index: 55;
      overflow: hidden;
    }

    /* Right panel — linked with grow-on-hover */
    #image-997 {
      width: 345px; height: 494px;
      left: 240px;  top: 725px;
      z-index: 50;
      overflow: hidden;
    }

    #image-997 a {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: all;
    }

    #image-997 a img {
      transition: transform 0.25s ease;
      pointer-events: none;
    }

    #image-997 a:hover img {
      transform: scale(1.06);
    }

    /* ── Order form ── */
    .order-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      font-family: 'Comic Neue', cursive;
    }

    .order-section h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .order-section p.subtitle {
      font-size: 15px;
      margin-bottom: 32px;
      color: #444;
    }

    .order-section label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    .order-section input,
    .order-section textarea,
    .order-section select {
      width: 100%;
      border: 2px solid #000;
      padding: 10px 12px;
      font-family: 'Comic Neue', cursive;
      font-size: 15px;
      background: #fff;
      border-radius: 0;
      appearance: none;
      outline: none;
    }

    .order-section input:focus,
    .order-section textarea:focus,
    .order-section select:focus {
      background: #fffde7;
    }

    .order-section textarea {
      resize: vertical;
      min-height: 90px;
    }

    .order-section .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .order-section button {
      display: block;
      width: 100%;
      margin-top: 32px;
      padding: 14px;
      background: #000;
      color: #fff;
      font-family: 'Comic Neue', cursive;
      font-size: 17px;
      font-weight: 700;
      border: 2px solid #000;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .order-section button:hover:not(:disabled) {
      background: #fff;
      color: #000;
    }

    .order-section button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #form-status {
      margin-top: 20px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      display: none;
    }

    #form-status.success {
      background: #e8f5e9;
      border: 2px solid #000;
      display: block;
    }

    #form-status.error {
      background: #ffebee;
      border: 2px solid #000;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="page">

      <!-- Background texture -->
      <div id="image-993" class="block">
        <img src="https://asset.mmm.page/86/44579b2c1746ff887cbda9476d60cc/1eyovfk.png" alt="">
      </div>

      <!-- Logo -->
      <div id="image-995" class="block">
        <img src="https://asset.mmm.page/e7/a80d1042854b77b4f64611bb2ef2f1/ldxppd.png" alt="Junki Magazine">
      </div>

      <!-- Rotating gif -->
      <div id="image-996" class="block">
        <img src="https://asset.mmm.page/d6/916509f49e460298883b873e4bdb88/879m6.gif" alt="">
      </div>

      <!-- Tagline -->
      <div id="text-about" class="block">Something about yourself</div>

      <!-- Main content -->
      <div id="image-994" class="block">
        <img src="https://asset.mmm.page/65/ec1e3e430a4bf3a4ab45a4dffd385f/tee5fy.png" alt="">
      </div>

      <!-- Left decorative panel -->
      <div id="image-998" class="block">
        <img src="https://asset.mmm.page/20/98e07c8d1248159fac37bbadf5d845/jh8s8o.png" alt="">
      </div>

      <!-- Right panel (linked) -->
      <div id="image-997" class="block">
        <a href="catalog.html" target="_self">
          <img src="https://asset.mmm.page/20/98e07c8d1248159fac37bbadf5d845/jh8s8o.png" alt="">
        </a>
      </div>

    </div>
  </div>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Order form (outside the scaled canvas so it stays readable on mobile) -->
  <section class="order-section">
    <h2>Order a copy</h2>
    <p class="subtitle">Fill in your details and we'll get back to you with payment info.</p>

    <form id="order-form" novalidate>
      <label for="f-name">Full name</label>
      <input id="f-name" name="customer_name" type="text" required placeholder="Your name">

      <label for="f-email">Email</label>
      <input id="f-email" name="customer_email" type="email" required placeholder="you@example.com">

      <label for="f-address">Delivery address</label>
      <textarea id="f-address" name="customer_address" required placeholder="Street, city, postcode, country"></textarea>

      <div class="row">
        <div>
          <label for="f-issue">Which issue</label>
          <input id="f-issue" name="issue" type="text" required placeholder="e.g. Issue 1">
        </div>
        <div>
          <label for="f-qty">Quantity</label>
          <input id="f-qty" name="quantity" type="number" min="1" value="1" required>
        </div>
      </div>

      <button type="submit" id="submit-btn">Place order</button>
      <div id="form-status"></div>
    </form>
  </section>

  <script>
    function scaleToFit() {
      var page = document.querySelector('.page');
      var wrapper = document.querySelector('.page-wrapper');
      var scale = window.innerWidth / 600;
      page.style.transform = 'scale(' + scale + ')';
      wrapper.style.height = (page.offsetHeight * scale) + 'px';
    }
    window.addEventListener('resize', scaleToFit);
    scaleToFit();
  </script>

  <script>
    // ── EmailJS config ──────────────────────────────────────────────
    // 1. Create a free account at https://emailjs.com
    // 2. Add an Email Service (Gmail, Outlook, etc.) → copy the Service ID
    // 3. Create TWO email templates (see comments below) → copy their Template IDs
    // 4. Go to Account → API Keys → copy your Public Key
    // Then replace the four placeholder strings below.

    var EMAILJS_PUBLIC_KEY   = 'YOUR_PUBLIC_KEY';   // Account > API Keys
    var EMAILJS_SERVICE_ID   = 'YOUR_SERVICE_ID';   // Email Services

    // Template 1 — order notification sent TO YOU
    // Suggested subject: "New order from {{customer_name}}"
    // Body: name, email, address, issue, quantity  (use {{variable_name}} syntax)
    var ORDER_TEMPLATE_ID    = 'YOUR_ORDER_TEMPLATE_ID';

    // Template 2 — auto-reply sent TO THE CUSTOMER
    // Suggested subject: "Thanks for your order — payment details inside"
    // Body: greet by {{customer_name}}, list their order, then paste your bank details
    // Set "To Email" field in the template to {{customer_email}}
    var REPLY_TEMPLATE_ID    = 'YOUR_REPLY_TEMPLATE_ID';
    // ────────────────────────────────────────────────────────────────

    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    document.getElementById('order-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      var form   = e.target;
      var btn    = document.getElementById('submit-btn');
      var status = document.getElementById('form-status');

      // Basic validation
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      var params = {
        customer_name:    form.customer_name.value.trim(),
        customer_email:   form.customer_email.value.trim(),
        customer_address: form.customer_address.value.trim(),
        issue:            form.issue.value.trim(),
        quantity:         form.quantity.value,
      };

      btn.disabled    = true;
      btn.textContent = 'Sending…';
      status.className = '';
      status.style.display = 'none';

      try {
        // Notify the collective
        await emailjs.send(EMAILJS_SERVICE_ID, ORDER_TEMPLATE_ID, params);
        // Auto-reply to the customer
        await emailjs.send(EMAILJS_SERVICE_ID, REPLY_TEMPLATE_ID, params);

        status.className     = 'success';
        status.textContent   = 'Order received! Check your inbox — we\'ve sent you payment details.';
        form.reset();
      } catch (err) {
        status.className   = 'error';
        status.textContent = 'Something went wrong. Please try again or email us directly.';
        console.error(err);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Place order';
      }
    });
  </script>
</body>
</html>
